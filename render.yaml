services:
  - type: web
    name: voicestep-backend
    runtime: docker
    buildCommand: "echo 'Rebuilding...'"
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
        scope: run
      - key: DATABASE_URL
        scope: run
      - key: GEMINI_API_KEY
        scope: run
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
        scope: run
      - key: GROQ_API_KEY
        scope: run
      - key: GROQ_MODEL
        value: whisper-large-v3-turbo
        scope: run
      - key: FIREBASE_PROJECT_ID
        scope: run
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        scope: run
      - key: STT_ENGINE
        value: groq_whisper
        scope: run
      - key: MAX_CONVERSATION_TURNS
        value: "5"
        scope: run
      - key: DEV_AUTH_BYPASS
        value: "false"
        scope: run
      - key: BACKEND_CORS_ORIGINS
        value: https://voicestep.vercel.app
        scope: run
      - key: BACKEND_URL
        value: https://voicestep-backend.render.com
        scope: run
      - key: FRONTEND_URL
        value: https://voicestep.vercel.app
        scope: run
      - key: APP_ENV
        value: production
        scope: run
